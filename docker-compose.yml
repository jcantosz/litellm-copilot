services:
  litellm-copilot:
    build: .
    ports:
      - "4000:4000"
    environment:
      # Option 1: Set GITHUB_TOKEN directly
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Option 2: Set COPILOT_PROXY_TOKEN_CMD to read from secret file
      - COPILOT_PROXY_TOKEN_CMD=${COPILOT_PROXY_TOKEN_CMD:-}
      - PORT=${PORT:-4000}
    volumes:
      # Mount custom config if needed
      - ./config.yaml:/app/config.yaml:ro
    secrets:
      # Optional: Use Docker secrets for token
      - github_token
    restart: unless-stopped

secrets:
  github_token:
    file: ${GITHUB_TOKEN_FILE:-./github_token.txt}
